<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Etrah Studio · Publication d'articles</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Josefin+Sans:wght@100;200;300;400&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#1a1612;--ink2:#2d2620;--ink3:#6b5e52;--cream:#f5f0e8;--cream2:#ede8dc;--gold:#b8922a;--gold2:#d4aa40;--gold-l:rgba(184,146,42,.12);--white:#fdfaf5;--green:#2e7d52;--red:#c0392b}
html{background:var(--cream);color:var(--ink);font-family:'Josefin Sans',sans-serif;min-height:100vh}
body{min-height:100vh}

/* TOP BAR */
.bar{background:#1a1208;padding:0 40px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.bar-logo{font-family:'Pinyon Script',cursive;font-size:28px;color:var(--white);line-height:1}
.bar-title{font-size:8px;letter-spacing:6px;text-transform:uppercase;color:rgba(255,255,255,.4);font-weight:200}
.bar-status{display:flex;align-items:center;gap:8px;font-size:7px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.5);font-weight:200}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.15)}
.dot.ok{background:#4caf50;box-shadow:0 0 6px rgba(76,175,80,.5)}
.dot.err{background:var(--red)}

/* LAYOUT */
.layout{display:grid;grid-template-columns:380px 1fr;min-height:calc(100vh - 52px)}

/* PANEL GAUCHE */
.left{background:var(--white);border-right:1px solid var(--gold-l);display:flex;flex-direction:column}

/* CONFIG */
.cfg{padding:24px;border-bottom:1px solid var(--gold-l)}
.cfg-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.cfg-label{font-size:8px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);font-weight:300}
.cfg-arrow{font-size:10px;color:var(--ink3);transition:transform .3s}
.cfg-arrow.open{transform:rotate(90deg)}
.cfg-body{margin-top:16px;display:none;flex-direction:column;gap:10px}
.cfg-body.show{display:flex}

/* FORM */
.form-section{padding:24px;border-bottom:1px solid var(--gold-l)}
.form-title{font-size:8px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);font-weight:300;margin-bottom:16px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-size:7px;letter-spacing:4px;text-transform:uppercase;color:var(--ink3);font-weight:200}
.field input,.field select,.field textarea{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--ink);background:transparent;border:none;border-bottom:1px solid rgba(184,146,42,.2);padding:6px 0;outline:none;transition:border-color .3s;width:100%}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--gold)}
.field select{cursor:pointer}
.field textarea{resize:none;min-height:60px;line-height:1.6}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* BUTTONS */
.btn{font-family:'Josefin Sans',sans-serif;font-weight:200;font-size:8px;letter-spacing:4px;text-transform:uppercase;padding:12px 20px;border:none;cursor:pointer;transition:all .3s;display:inline-flex;align-items:center;gap:8px}
.btn-gold{background:var(--gold);color:var(--white)}
.btn-gold:hover{background:var(--gold2)}
.btn-outline{background:transparent;border:1px solid rgba(184,146,42,.3);color:var(--gold)}
.btn-outline:hover{background:var(--gold-l);border-color:var(--gold)}
.btn-sm{padding:8px 14px;font-size:7px;letter-spacing:3px}
.btn-danger{background:transparent;border:1px solid rgba(192,57,43,.3);color:var(--red)}
.btn-danger:hover{background:rgba(192,57,43,.08)}
.btn-green{background:var(--green);color:var(--white)}
.btn-green:hover{opacity:.9}
.btn-full{width:100%;justify-content:center}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* QUEUE */
.queue{padding:24px;flex:1;overflow-y:auto}
.queue-title{font-size:8px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);font-weight:300;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.queue-count{background:var(--gold);color:var(--white);border-radius:10px;padding:2px 8px;font-size:7px}
.q-empty{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:var(--ink3);text-align:center;padding:24px 0;opacity:.6}

/* ARTICLE CARD IN QUEUE */
.q-card{border:1px solid var(--gold-l);background:var(--cream);margin-bottom:10px;overflow:hidden;border-radius:2px}
.q-card.scheduled{border-left:3px solid var(--gold)}
.q-card.generating{border-left:3px solid #f39c12;animation:pulse 1.5s infinite}
.q-card.done{border-left:3px solid var(--green);opacity:.75}
.q-card.error{border-left:3px solid var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.q-head{padding:12px 14px;display:flex;align-items:flex-start;gap:10px;cursor:pointer}
.q-icon{font-size:14px;flex-shrink:0;margin-top:2px}
.q-info{flex:1;min-width:0}
.q-title{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:15px;color:var(--ink);line-height:1.3;margin-bottom:4px}
.q-meta{font-size:7px;letter-spacing:3px;text-transform:uppercase;color:var(--ink3);font-weight:200}
.q-actions{display:flex;gap:6px;padding:0 14px 12px;flex-wrap:wrap}
.q-log{padding:8px 14px;background:rgba(26,22,18,.04);font-family:monospace;font-size:11px;color:var(--ink3);line-height:1.6;border-top:1px solid var(--gold-l);display:none;max-height:120px;overflow-y:auto}
.q-log.show{display:block}
.log-line{margin:0;padding:1px 0}
.log-ok{color:var(--green)}
.log-err{color:var(--red)}
.log-info{color:var(--gold)}

/* MAIN AREA */
.right{padding:40px;display:flex;flex-direction:column;gap:24px;overflow-y:auto}
.preview-card{background:var(--white);border:1px solid var(--gold-l);padding:32px;border-radius:2px}
.preview-label{font-size:8px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);font-weight:300;margin-bottom:20px}
.preview-empty{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:var(--ink3);opacity:.5;text-align:center;padding:40px 0}
.preview-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:28px;color:var(--ink);margin-bottom:8px}
.preview-cat{font-size:8px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);font-weight:200;margin-bottom:20px}
.preview-intro{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px;color:var(--ink2);line-height:1.85;border-left:2px solid var(--gold);padding-left:20px;margin-bottom:20px}
.preview-section{margin-bottom:16px}
.preview-h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:18px;color:var(--ink);margin-bottom:6px}
.preview-p{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--ink2);line-height:1.8;margin-bottom:6px}
.preview-stat{background:var(--ink);padding:16px 20px;display:flex;align-items:center;gap:16px;margin:8px 0}
.preview-stat-n{font-family:'Cormorant Garamond',serif;font-size:36px;color:var(--gold2);font-weight:300;line-height:1;flex-shrink:0}
.preview-stat-t{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:rgba(253,250,245,.8)}
.preview-quote{border-left:2px solid var(--gold);padding:12px 20px;background:var(--gold-l);margin:8px 0}
.preview-quote p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:var(--ink);line-height:1.7}
.preview-quote cite{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--ink3);font-family:'Josefin Sans',sans-serif;font-weight:100}

/* CALENDAR */
.cal-card{background:var(--white);border:1px solid var(--gold-l);padding:28px;border-radius:2px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:16px}
.cal-day-name{font-size:7px;letter-spacing:3px;text-transform:uppercase;color:var(--ink3);text-align:center;padding:4px;font-weight:300}
.cal-day{min-height:44px;border:1px solid transparent;border-radius:2px;padding:4px 6px;font-size:11px;color:var(--ink3);position:relative;font-family:'Cormorant Garamond',serif}
.cal-day.has-art{background:rgba(184,146,42,.08);border-color:rgba(184,146,42,.2)}
.cal-day.today{border-color:var(--gold);background:rgba(184,146,42,.05)}
.cal-day-num{font-size:12px;color:var(--ink);font-weight:400}
.cal-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);margin-top:4px}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:var(--white);font-size:8px;letter-spacing:4px;text-transform:uppercase;padding:12px 20px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;max-width:320px}
.toast.show{opacity:1}
.toast.ok{border-left:3px solid var(--green)}
.toast.err{border-left:3px solid var(--red)}

/* PROGRESS */
.progress{height:2px;background:rgba(184,146,42,.15);margin-top:8px;border-radius:1px;overflow:hidden}
.progress-bar{height:100%;background:var(--gold);width:0%;transition:width .4s;border-radius:1px}
</style>
</head>
<body>

<div class="bar">
  <span class="bar-logo">Etrah</span>
  <span class="bar-title">Studio · Publication</span>
  <div class="bar-status">
    <div class="dot" id="dot-anthropic" title="Anthropic API"></div>
    <span>Claude</span>
    <div class="dot" id="dot-github" style="margin-left:8px" title="GitHub API"></div>
    <span>GitHub</span>
  </div>
</div>

<div class="layout">

  <!-- ── PANNEAU GAUCHE ── -->
  <div class="left">

    <!-- CONFIG -->
    <div class="cfg">
      <div class="cfg-toggle" onclick="toggleCfg()">
        <span class="cfg-label">⚙ Configuration</span>
        <span class="cfg-arrow" id="cfg-arrow">▶</span>
      </div>
      <div class="cfg-body" id="cfg-body">
        <div class="field">
          <label>Clé API Anthropic</label>
          <input type="password" id="cfg-anthropic" placeholder="sk-ant-api03-…" oninput="saveCfg()">
        </div>
        <div class="field">
          <label>GitHub Token (repo + contents)</label>
          <input type="password" id="cfg-github" placeholder="ghp_…" oninput="saveCfg()">
        </div>
        <div class="field-row">
          <div class="field">
            <label>GitHub Owner</label>
            <input type="text" id="cfg-owner" placeholder="votre-username" oninput="saveCfg()">
          </div>
          <div class="field">
            <label>Repo</label>
            <input type="text" id="cfg-repo" placeholder="site-mariage" oninput="saveCfg()">
          </div>
        </div>
        <div class="field">
          <label>Branche</label>
          <input type="text" id="cfg-branch" placeholder="main" oninput="saveCfg()">
        </div>
        <button class="btn btn-outline btn-sm btn-full" onclick="testConnections()">Tester les connexions</button>
      </div>
    </div>

    <!-- FORM NOUVEL ARTICLE -->
    <div class="form-section">
      <div class="form-title">Nouvel article</div>
      <div class="field">
        <label>Titre de l'article</label>
        <input type="text" id="f-title" placeholder="Pourquoi un site de mariage change tout…" onkeydown="if(event.key==='Enter')schedule()">
      </div>
      <div class="field">
        <label>Date de publication</label>
        <input type="date" id="f-date">
      </div>
      <div class="field">
        <label>Heure de publication</label>
        <input type="time" id="f-time" value="09:00">
      </div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn btn-gold btn-full" onclick="schedule()">⏱ Planifier</button>
        <button class="btn btn-outline" onclick="publishNow()" title="Publier maintenant">⚡</button>
      </div>
    </div>

    <!-- QUEUE -->
    <div class="queue">
      <div class="queue-title">
        File d'attente
        <span class="queue-count" id="q-count">0</span>
      </div>
      <div id="queue-list">
        <p class="q-empty">Aucun article planifié</p>
      </div>
    </div>

  </div>

  <!-- ── PANNEAU DROIT ── -->
  <div class="right">

    <!-- PREVIEW -->
    <div class="preview-card">
      <div class="preview-label">Aperçu du dernier article généré</div>
      <div id="preview-content">
        <p class="preview-empty">L'aperçu apparaîtra ici après génération</p>
      </div>
    </div>

    <!-- CALENDRIER -->
    <div class="cal-card">
      <div class="preview-label">Calendrier — <span id="cal-month"></span></div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// CONFIG & STORAGE
// ═══════════════════════════════════════════════════════════════════════════
var SITE_URL = 'https://www.site-mariage.com';
var HEROES = [
  'https://images.unsplash.com/photo-1606800052052-a08af7148866?w=1400&q=85&auto=format&fit=crop',
  'https://images.unsplash.com/photo-1522673607200-164d1b6ce486?w=1400&q=85&auto=format&fit=crop',
  'https://images.unsplash.com/photo-1537633552985-df8429e8048b?w=1400&q=85&auto=format&fit=crop',
  'https://images.unsplash.com/photo-1469371670807-013ccf25f16a?w=1400&q=85&auto=format&fit=crop',
  'https://images.unsplash.com/photo-1519741497674-611481863552?w=1400&q=85&auto=format&fit=crop',
  'https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=1400&q=85&auto=format&fit=crop',
  'https://images.unsplash.com/photo-1465495976277-4387d4b0b4c6?w=1400&q=85&auto=format&fit=crop',
  'https://images.unsplash.com/photo-1491895200222-0fc4a4c35e18?w=1400&q=85&auto=format&fit=crop',
];
var MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

function cfg(){ return JSON.parse(localStorage.getItem('etrah-cfg')||'{}'); }
function saveCfg(){
  localStorage.setItem('etrah-cfg', JSON.stringify({
    anthropic: document.getElementById('cfg-anthropic').value,
    github:    document.getElementById('cfg-github').value,
    owner:     document.getElementById('cfg-owner').value,
    repo:      document.getElementById('cfg-repo').value,
    branch:    document.getElementById('cfg-branch').value || 'main',
  }));
  updateDots();
}
function loadCfg(){
  var c = cfg();
  if(c.anthropic) document.getElementById('cfg-anthropic').value = c.anthropic;
  if(c.github)    document.getElementById('cfg-github').value    = c.github;
  if(c.owner)     document.getElementById('cfg-owner').value     = c.owner;
  if(c.repo)      document.getElementById('cfg-repo').value      = c.repo;
  if(c.branch)    document.getElementById('cfg-branch').value    = c.branch || 'main';
  updateDots();
}
function updateDots(){
  var c = cfg();
  document.getElementById('dot-anthropic').className = 'dot ' + (c.anthropic ? 'ok' : 'err');
  document.getElementById('dot-github').className    = 'dot ' + (c.github && c.owner && c.repo ? 'ok' : 'err');
}

// Queue persistence
function getQueue(){ return JSON.parse(localStorage.getItem('etrah-queue')||'[]'); }
function setQueue(q){ localStorage.setItem('etrah-queue', JSON.stringify(q)); }

// ═══════════════════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════════════════
function slugify(t){
  var s = t.toLowerCase();
  var map = {à:'a',â:'a',ä:'a',é:'e',è:'e',ê:'e',ë:'e',î:'i',ï:'i',ô:'o',ö:'o',ù:'u',û:'u',ü:'u',ç:'c',ñ:'n'};
  s = s.replace(/[àâäéèêëîïôöùûüçñ]/g, function(c){ return map[c]||c; });
  return s.replace(/[^a-z0-9\s-]/g,'').trim().replace(/\s+/g,'-').replace(/-+/g,'-');
}
function pickHero(slug){
  var h=0; for(var i=0;i<slug.length;i++) h=(h*31+slug.charCodeAt(i))&0xffffffff;
  return HEROES[Math.abs(h)%HEROES.length];
}
function dateLabel(iso){ var d=new Date(iso+'T00:00:00'); return MONTHS_FR[d.getMonth()]+' '+d.getFullYear(); }
function toast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show '+(type||'');
  clearTimeout(t._t); t._t=setTimeout(function(){ t.className='toast'; },3200);
}
function parseInline(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g,'<em>$1</em>');
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ═══════════════════════════════════════════════════════════════════════════
// ANTHROPIC API
// ═══════════════════════════════════════════════════════════════════════════
async function generateContent(title){
  var c = cfg();
  if(!c.anthropic) throw new Error('Clé Anthropic manquante');

  var prompt = `Génère un article de blog complet et SEO-optimisé pour le titre : "${title}"

Public : couples français qui planifient leur mariage.
Agence : Etrah — sites de mariage sur-mesure, 500€, livraison 10-14 jours, basé à Nice.
Longueur : 900-1100 mots de contenu réel. Ton : élégant, précis, orienté couples, données concrètes.

Réponds UNIQUEMENT avec un JSON valide :
{
  "slug": "slug-sans-accents",
  "category": "Catégorie · Sous-catégorie",
  "meta_description": "Max 155 caractères",
  "read_time": "X min de lecture",
  "hero_alt": "Description image idéale",
  "intro": "2-3 phrases d'accroche percutantes",
  "sections": [
    {"type":"text",  "h2":"Titre", "paragraphs":["Para 1 avec **gras**.","Para 2..."]},
    {"type":"stat",  "number":"67%", "description":"Explication précise."},
    {"type":"quote", "text":"Citation réaliste d'un couple français.", "author":"Prénom & Prénom, Ville, mois 2026"},
    {"type":"list",  "h2":"Titre liste", "items":["**Item 1** — explication","**Item 2** — explication"]},
    {"type":"text",  "h2":"Section finale", "paragraphs":["Conclusion orientée action..."]}
  ],
  "excerpt": "1-2 phrases pour la miniature page d'accueil."
}
Règles : 5-7 sections variées, stats réalistes, citations 100% françaises, Etrah mentionné naturellement dans 1 section max.`;

  var resp = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key': c.anthropic,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body: JSON.stringify({
      model:'claude-opus-4-8',
      max_tokens:4096,
      system:'Tu es rédacteur expert pour Etrah, agence française de sites de mariage sur-mesure. Style élégant, direct, SEO naturel, orienté couples français.',
      messages:[{role:'user',content:prompt}]
    })
  });

  if(!resp.ok){
    var err = await resp.json().catch(()=>({error:{message:resp.statusText}}));
    throw new Error(err.error?.message || resp.statusText);
  }
  var data = await resp.json();
  var raw = data.content[0].text.trim().replace(/^```(?:json)?\n?/,'').replace(/\n?```$/,'');
  return JSON.parse(raw);
}

// ═══════════════════════════════════════════════════════════════════════════
// HTML BUILDER
// ═══════════════════════════════════════════════════════════════════════════
function buildSectionHtml(s){
  var out = s.h2 ? '<h2>'+esc(s.h2)+'</h2>\n' : '';
  if(s.type==='text') s.paragraphs.forEach(function(p){ out+='<p>'+parseInline(p)+'</p>\n'; });
  else if(s.type==='stat') out+='<div class="stat"><div class="stat-n">'+esc(s.number)+'</div><div class="stat-t">'+esc(s.description)+'</div></div>\n';
  else if(s.type==='quote') out+='<div class="quote"><p>'+esc(s.text)+'</p>'+(s.author?'<cite>— '+esc(s.author)+'</cite>':'')+'</div>\n';
  else if(s.type==='list') out+='<ul>\n'+s.items.map(function(i){return'<li>'+parseInline(i)+'</li>';}).join('\n')+'\n</ul>\n';
  return out;
}

function buildArticleHtml(title, data, slug, heroUrl, dateIso){
  var dateF = MONTHS_FR[new Date(dateIso+'T00:00').getMonth()]+' '+new Date(dateIso+'T00:00').getFullYear();
  var body = (data.sections||[]).map(buildSectionHtml).join('\n');
  var pageUrl = SITE_URL+'/'+slug+'.html';
  var titleE = esc(title), metaE = esc(data.meta_description||''), heroE = esc(heroUrl);
  return`<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>${titleE}</title>
<meta name="description" content="${metaE}">
<meta property="og:title" content="${titleE}"><meta property="og:description" content="${metaE}">
<meta property="og:type" content="article"><meta property="og:image" content="${heroE}">
<meta property="article:published_time" content="${dateIso}T09:00:00+02:00">
<meta property="article:modified_time" content="${dateIso}T09:00:00+02:00">
<meta property="article:author" content="Rayan Polizzi">
<link rel="canonical" href="${pageUrl}">

// ═══════════════════════════════════════════════════════════════════════════
// GITHUB API
// ═══════════════════════════════════════════════════════════════════════════
async function ghGet(path){
  var c=cfg();
  var r=await fetch('https://api.github.com/repos/'+c.owner+'/'+c.repo+'/contents/'+path+'?ref='+c.branch,{
    headers:{Authorization:'token '+c.github,'Accept':'application/vnd.github.v3+json'}
  });
  if(!r.ok) return null;
  return r.json();
}
async function ghPut(path, content, message, sha){
  var c=cfg();
  var body={message:message,content:btoa(unescape(encodeURIComponent(content))),branch:c.branch};
  if(sha) body.sha=sha;
  var r=await fetch('https://api.github.com/repos/'+c.owner+'/'+c.repo+'/contents/'+path,{
    method:'PUT',
    headers:{Authorization:'token '+c.github,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},
    body:JSON.stringify(body)
  });
  if(!r.ok){ var e=await r.json(); throw new Error(e.message||r.statusText); }
  return r.json();
}
function ghDecode(file){ return decodeURIComponent(escape(atob(file.content.replace(/\n/g,'')))); }

async function pushAll(title, data, slug, heroUrl, dateIso, logFn){
  logFn('info','Récupération des fichiers GitHub...');

  // 1. Article
  var articleHtml = buildArticleHtml(title, data, slug, heroUrl, dateIso);
  var existingArt = await ghGet(slug+'.html');
  await ghPut(slug+'.html', articleHtml, '✦ Article : '+title, existingArt?.sha);
  logFn('ok','Article poussé → '+slug+'.html');

  // 2. Sitemap
  var sitemapFile = await ghGet('sitemap.xml');
  if(sitemapFile){
    var sm = ghDecode(sitemapFile);
    var entry = '  <url>\n    <loc>'+SITE_URL+'/'+slug+'.html</loc>\n    <lastmod>'+dateIso+'</lastmod>\n    <changefreq>monthly</changefreq>\n    <priority>0.8</priority>\n  </url>';
    var marker = '  <!-- Pages légales -->';
    sm = sm.includes(marker) ? sm.replace(marker, entry+'\n\n'+marker) : sm.replace('</urlset>', entry+'\n\n</urlset>');
    await ghPut('sitemap.xml', sm, '✦ Sitemap : '+slug, sitemapFile.sha);
    logFn('ok','sitemap.xml mis à jour');
  }

  // 3. Index
  var idxFile = await ghGet('index.html');
  if(idxFile){
    var idx = ghDecode(idxFile);
    var thumb = heroUrl.replace('w=1400','w=800');
    var dateF = MONTHS_FR[new Date(dateIso+'T00:00').getMonth()]+' '+new Date(dateIso+'T00:00').getFullYear();
    var cat = esc(data.category||'Magazine');
    var exc = esc(data.excerpt||data.meta_description||'');
    var card = `    <!-- ${esc(title)} -->\n    <article class="blog-card rv" onclick="window.location='${slug}.html'" style="cursor:pointer">\n      <div class="blog-img"><img src="${esc(thumb)}" alt="${esc(title)}" loading="lazy"></div>\n      <div class="blog-body">\n        <p class="blog-cat">${cat}</p>\n        <h3 class="blog-title">${esc(title)}</h3>\n        <p class="blog-excerpt">${exc}</p>\n        <div class="blog-footer"><span class="blog-date">${dateF}</span><a class="blog-read" href="${slug}.html">Lire l'article →</a></div>\n      </div>\n    </article>`;
    var m = '<div class="blog-grid">';
    if(idx.includes(m)) idx = idx.replace(m, m+'\n\n'+card+'\n');
    await ghPut('index.html', idx, '✦ Index : ajout '+title, idxFile.sha);
    logFn('ok','index.html mis à jour');
  }

  logFn('ok','✦ Publication terminée → '+SITE_URL+'/'+slug+'.html');
}

// ═══════════════════════════════════════════════════════════════════════════
// QUEUE MANAGEMENT
// ═══════════════════════════════════════════════════════════════════════════
function schedule(){
  var title = document.getElementById('f-title').value.trim();
  var date  = document.getElementById('f-date').value;
  var time  = document.getElementById('f-time').value || '09:00';
  if(!title){ toast('Titre requis','err'); return; }
  if(!date){  toast('Date requise','err');  return; }

  var q = getQueue();
  var id = Date.now().toString();
  q.push({ id, title, date, time, status:'scheduled', logs:[], data:null, slug:null });
  setQueue(q);
  renderQueue();
  buildCalendar();
  document.getElementById('f-title').value='';
  toast('Article planifié pour le '+date+' à '+time,'ok');
}

function publishNow(){
  var title = document.getElementById('f-title').value.trim();
  if(!title){ toast('Titre requis','err'); return; }
  var today = new Date().toISOString().split('T')[0];
  var now   = new Date().toTimeString().slice(0,5);
  var q = getQueue();
  var id = Date.now().toString();
  q.push({ id, title, date:today, time:now, status:'scheduled', logs:[], data:null, slug:null });
  setQueue(q);
  document.getElementById('f-title').value='';
  renderQueue();
  // Trigger immediately
  setTimeout(function(){ processArticle(id); }, 300);
}

async function processArticle(id){
  var q = getQueue();
  var item = q.find(function(x){return x.id===id;});
  if(!item || item.status==='done') return;

  item.status = 'generating';
  item.logs = [];
  setQueue(q);
  renderQueue();

  function logFn(type, msg){
    var q2=getQueue(), it=q2.find(function(x){return x.id===id;});
    if(!it)return;
    it.logs.push({type,msg,t:new Date().toLocaleTimeString('fr',{hour:'2-digit',minute:'2-digit',second:'2-digit'})});
    setQueue(q2);
    renderQueue();
  }

  try {
    logFn('info','Génération du contenu avec Claude...');
    var data = await generateContent(item.title);
    logFn('ok','Contenu généré — '+data.sections.length+' sections');

    var q2=getQueue(), it=q2.find(function(x){return x.id===id;});
    var slug = data.slug || slugify(item.title);
    var heroUrl = pickHero(slug);
    it.data = data; it.slug = slug;
    setQueue(q2);

    renderPreview(item.title, data);

    await pushAll(item.title, data, slug, heroUrl, item.date, logFn);

    var q3=getQueue(), it3=q3.find(function(x){return x.id===id;});
    it3.status='done';
    setQueue(q3);
    renderQueue();
    buildCalendar();
    toast('✦ "'+item.title+'" publié !','ok');

  } catch(e){
    logFn('err','Erreur : '+e.message);
    var q4=getQueue(), it4=q4.find(function(x){return x.id===id;});
    if(it4){ it4.status='error'; setQueue(q4); renderQueue(); }
    toast('Erreur : '+e.message,'err');
  }
}

function removeArticle(id){
  var q = getQueue().filter(function(x){return x.id!==id;});
  setQueue(q);
  renderQueue();
  buildCalendar();
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDER QUEUE
// ═══════════════════════════════════════════════════════════════════════════
var ICONS = {scheduled:'⏱',generating:'⚡',done:'✓',error:'✕'};
var LABELS = {scheduled:'Planifié','generating':'En cours...','done':'Publié','error':'Erreur'};

function renderQueue(){
  var q = getQueue();
  var el = document.getElementById('queue-list');
  document.getElementById('q-count').textContent = q.length;
  if(!q.length){ el.innerHTML='<p class="q-empty">Aucun article planifié</p>'; return; }

  el.innerHTML = q.slice().reverse().map(function(item){
    var logHtml = item.logs.map(function(l){
      return'<p class="log-line log-'+l.type+'">'+l.t+' '+l.msg+'</p>';
    }).join('');
    var actions = '';
    if(item.status==='scheduled') actions='<button class="btn btn-green btn-sm" onclick="processArticle(\''+item.id+'\')">Publier maintenant</button>';
    if(item.status==='done' && item.slug) actions='<a class="btn btn-outline btn-sm" href="'+SITE_URL+'/'+item.slug+'.html" target="_blank">Voir en ligne</a>';
    if(item.status==='error') actions='<button class="btn btn-outline btn-sm" onclick="processArticle(\''+item.id+'\')">Réessayer</button>';
    actions+='<button class="btn btn-danger btn-sm" onclick="removeArticle(\''+item.id+'\')">Supprimer</button>';

    return'<div class="q-card '+item.status+'" id="qc-'+item.id+'">'+
      '<div class="q-head" onclick="toggleLog(\''+item.id+'\')">'+
        '<span class="q-icon">'+ICONS[item.status]+'</span>'+
        '<div class="q-info">'+
          '<div class="q-title">'+esc(item.title)+'</div>'+
          '<div class="q-meta">'+LABELS[item.status]+' · '+item.date+' à '+item.time+'</div>'+
          (item.status==='generating'?'<div class="progress"><div class="progress-bar" style="width:60%;animation:prog 2s infinite"></div></div>':'')+
        '</div>'+
      '</div>'+
      '<div class="q-actions">'+actions+'</div>'+
      '<div class="q-log" id="log-'+item.id+'">'+logHtml+'</div>'+
    '</div>';
  }).join('');
}

function toggleLog(id){
  var el=document.getElementById('log-'+id);
  if(el) el.classList.toggle('show');
}

// PREVIEW
// ═══════════════════════════════════════════════════════════════════════════
function renderPreview(title, data){
  var html='<div class="preview-cat">'+esc(data.category||'')+'</div>'+
    '<div class="preview-title">'+esc(title)+'</div>'+
    '<div class="preview-intro">'+esc(data.intro||'')+'</div>';
  (data.sections||[]).forEach(function(s){
    html+='<div class="preview-section">';
    if(s.h2) html+='<div class="preview-h2">'+esc(s.h2)+'</div>';
    if(s.type==='text') s.paragraphs.forEach(function(p){ html+='<div class="preview-p">'+esc(p.substring(0,120))+(p.length>120?'…':'')+'</div>'; });
    else if(s.type==='stat') html+='<div class="preview-stat"><div class="preview-stat-n">'+esc(s.number)+'</div><div class="preview-stat-t">'+esc(s.description)+'</div></div>';
    else if(s.type==='quote') html+='<div class="preview-quote"><p>'+esc(s.text.substring(0,150))+'…</p>'+(s.author?'<cite>— '+esc(s.author)+'</cite>':'')+'</div>';
    else if(s.type==='list') html+='<div class="preview-p">'+s.items.slice(0,3).map(function(i){return'• '+esc(i.substring(0,80));}).join('<br>')+'</div>';
    html+='</div>';
  });
  document.getElementById('preview-content').innerHTML=html;
}

// CALENDAR
// ═══════════════════════════════════════════════════════════════════════════
function buildCalendar(){
  var now=new Date(), y=now.getFullYear(), m=now.getMonth();
  document.getElementById('cal-month').textContent=MONTHS_FR[m]+' '+y;
  var first=new Date(y,m,1).getDay(); first=(first+6)%7; // Mon=0
  var days=new Date(y,m+1,0).getDate();
  var q=getQueue();
  var artDays={};
  q.forEach(function(item){
    var d=new Date(item.date+'T00:00');
    if(d.getFullYear()===y && d.getMonth()===m){
      var day=d.getDate();
      artDays[day]=artDays[day]||[];
      artDays[day].push(item);
    }
  });

  var grid=document.getElementById('cal-grid');
  var dayNames=['Lu','Ma','Me','Je','Ve','Sa','Di'];
  var html=dayNames.map(function(d){return'<div class="cal-day-name">'+d+'</div>';}).join('');
  for(var i=0;i<first;i++) html+='<div></div>';
  for(var d2=1;d2<=days;d2++){
    var isToday=(d2===now.getDate());
    var arts=artDays[d2]||[];
    html+='<div class="cal-day'+(arts.length?' has-art':'')+(isToday?' today':'')+'">'+
      '<div class="cal-day-num">'+d2+'</div>'+
      arts.map(function(){ return'<div class="cal-dot"></div>'; }).join('')+
    '</div>';
  }
  grid.innerHTML=html;
}

// ═══════════════════════════════════════════════════════════════════════════
// AUTO-SCHEDULER (vérifie toutes les 30s)
// ═══════════════════════════════════════════════════════════════════════════
function checkScheduled(){
  var now=new Date();
  var q=getQueue();
  var todayDate=now.toISOString().split('T')[0];
  var nowTime=now.toTimeString().slice(0,5);
  q.forEach(function(item){
    if(item.status!=='scheduled') return;
    if(item.date < todayDate || (item.date===todayDate && item.time<=nowTime)){
      processArticle(item.id);
    }
  });
}

function toggleCfg(){
  var b=document.getElementById('cfg-body');
  var a=document.getElementById('cfg-arrow');
  b.classList.toggle('show');
  a.classList.toggle('open');
}

async function testConnections(){
  var c=cfg();
  // Test Anthropic
  try{
    var r=await fetch('https://api.anthropic.com/v1/models',{
      headers:{'x-api-key':c.anthropic,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'}
    });
    document.getElementById('dot-anthropic').className='dot '+(r.ok?'ok':'err');
    if(!r.ok) toast('Anthropic : clé invalide','err');
  } catch(e){ document.getElementById('dot-anthropic').className='dot err'; toast('Anthropic : '+e.message,'err'); }

  // Test GitHub
  try{
    var r2=await fetch('https://api.github.com/repos/'+c.owner+'/'+c.repo,{
      headers:{Authorization:'token '+c.github,'Accept':'application/vnd.github.v3+json'}
    });
    document.getElementById('dot-github').className='dot '+(r2.ok?'ok':'err');
    if(r2.ok) toast('Connexions OK ✓','ok');
    else toast('GitHub : repo introuvable ou token invalide','err');
  } catch(e){ document.getElementById('dot-github').className='dot err'; }
}
