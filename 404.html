<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Josefin+Sans:wght@100;200;300&family=Pinyon+Script&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23fdfaf5'/><text y='74' x='50' text-anchor='middle' font-size='72' font-family='Georgia,serif' fill='%23b8922a'>E</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#1a1612;--ink2:#2d2620;--ink3:#6b5e52;--gold:#b8922a;--gold2:#d4aa40;--cream:#f5f0e8;--white:#fdfaf5}
html,body{height:100%}
body{
  background:radial-gradient(ellipse 85% 65% at 50% 35%,var(--white) 0%,#faf6f0 60%,#f4ede3 100%);
  color:var(--ink);
  font-family:'Cormorant Garamond',serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;text-align:center;padding:40px 24px;
}

/* Nav */
nav{position:fixed;top:0;left:0;right:0;padding:20px 52px;display:flex;align-items:center;justify-content:space-between;background:rgba(253,250,245,.96);backdrop-filter:blur(20px);border-bottom:1px solid rgba(184,146,42,.1);z-index:100}
.nav-logo{font-family:'Pinyon Script',cursive;font-size:34px;color:var(--ink);text-decoration:none;line-height:1}
.nav-back{font-family:'Josefin Sans',sans-serif;font-weight:200;font-size:8px;letter-spacing:5px;text-transform:uppercase;color:var(--ink3);text-decoration:none;transition:color .3s}
.nav-back:hover{color:var(--gold)}

/* Contenu */
.content{max-width:560px}

.big-num{
  font-family:'Pinyon Script',cursive;
  font-size:clamp(120px,20vw,220px);
  line-height:1;
  background:linear-gradient(135deg,rgba(184,146,42,.3) 0%,rgba(212,170,64,.7) 50%,rgba(184,146,42,.3) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:-16px;
}

.eyebrow{
  font-family:'Josefin Sans',sans-serif;font-weight:200;
  font-size:8px;letter-spacing:8px;text-transform:uppercase;
  color:var(--gold);margin-bottom:20px;
}

.title{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;
  font-size:clamp(28px,5vw,42px);color:var(--ink);
  line-height:1.2;margin-bottom:16px;
}

.sub{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:18px;color:var(--ink3);line-height:1.8;
  margin-bottom:40px;
}

/* Ornement */
.orn{display:flex;align-items:center;gap:14px;justify-content:center;margin-bottom:40px}
.orn-l{width:40px;height:1px;background:linear-gradient(to right,transparent,rgba(184,146,42,.4))}
.orn-l.r{background:linear-gradient(to left,transparent,rgba(184,146,42,.4))}
.orn-d{width:6px;height:6px;border:1px solid rgba(184,146,42,.55);transform:rotate(45deg)}

.btn-home{
  display:inline-block;
  font-family:'Josefin Sans',sans-serif;font-weight:200;
  font-size:9px;letter-spacing:6px;text-transform:uppercase;
  color:var(--white);background:var(--ink);
  padding:16px 40px;text-decoration:none;
  border:1px solid transparent;transition:background .3s,border-color .3s;
  margin-bottom:20px;
}
.btn-home:hover{background:var(--gold);border-color:var(--gold)}

.btn-wa{
  display:inline-flex;align-items:center;gap:8px;
  font-family:'Josefin Sans',sans-serif;font-weight:200;
  font-size:9px;letter-spacing:5px;text-transform:uppercase;
  color:var(--gold);text-decoration:none;
  transition:opacity .3s;
}
.btn-wa:hover{opacity:.7}

.btns{display:flex;flex-direction:column;align-items:center;gap:14px}

.devise{
  margin-top:52px;
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:14px;color:rgba(184,146,42,.45);letter-spacing:1px;
}

@media(max-width:600px){
  nav{padding:16px 20px}
  .nav-logo{font-size:28px}
  .btns{width:100%}
  .btn-home{width:100%;text-align:center}
}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">Etrah</a>
  <a class="nav-back" href="index.html">← Retour au site</a>
</nav>

<div class="content">
  <div class="big-num">404</div>
  <p class="eyebrow">Page introuvable</p>
  <h1 class="title">Cette page s'est égarée<br>comme une invitation perdue</h1>
  <div class="orn"><div class="orn-l"></div><div class="orn-d"></div><div class="orn-l r"></div></div>
  <p class="sub">La page que vous cherchez n'existe pas ou a été déplacée.<br>Retournez à l'accueil pour continuer.</p>
  <div class="btns">
    <a class="btn-home" href="index.html">Retourner à l'accueil</a>

      Une question ? WhatsApp
    </a>
  </div>
  <p class="devise">Chaque amour mérite sa propre invitation.</p>
</div>
</body>
</html>
