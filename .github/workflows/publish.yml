name: Publier les articles Etrah

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install anthropic

      - name: Publier les articles planifiés
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python .github/scripts/publish.py

      - name: Commit et push
        run: |
          git config user.name "Etrah Studio"
          git config user.email "studio@site-mariage.com"
          git add -A
          git diff --staged --quiet || git commit -m "✦ Article publié automatiquement — $(date +'%Y-%m-%d')"
          git push
